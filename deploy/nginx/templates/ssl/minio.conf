# HTTPS — minio.премиумель.рф — веб-консоль MinIO

server {
    listen 80;
    server_name minio.xn--e1aaincbri4a7g.xn--p1ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name minio.xn--e1aaincbri4a7g.xn--p1ai;

    ssl_certificate /etc/letsencrypt/live/xn--e1aaincbri4a7g.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--e1aaincbri4a7g.xn--p1ai/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://minio:9001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        chunked_transfer_encoding off;
    }
}
